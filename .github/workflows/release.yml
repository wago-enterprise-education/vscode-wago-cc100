# GitHub Action to build VSIX and attach to releases
# Triggers on release creation and manual dispatch
# Follows specific build steps: global vsce install, cleanup, cache verify, ci install, package

name: Build and Attach VSIX to Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      source_type:
        description: 'What to build from'
        required: true
        type: choice
        options:
        - 'release'
        - 'tag'
        - 'branch'
        - 'commit'
        default: 'release'
      source_value:
        description: 'Release tag, branch name, tag name, or commit SHA'
        required: true
        type: string
        default: 'main'
      target_release:
        description: 'Release tag to attach VSIX to (leave empty for artifact only)'
        required: false
        type: string

jobs:
  build-and-attach-vsix:
    runs-on: ubuntu-latest
    steps:
    - name: Determine checkout reference
      id: checkout-ref
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          echo "ref=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          echo "Building from release: ${{ github.event.release.tag_name }}"
        else
          echo "ref=${{ inputs.source_value }}" >> $GITHUB_OUTPUT
          echo "Building from ${{ inputs.source_type }}: ${{ inputs.source_value }}"
        fi

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.checkout-ref.outputs.ref }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        cache: 'npm'

    - name: Install VSCE globally
      run: npm install -g @vscode/vsce

    - name: Clean build artifacts and dependencies
      run: rm -rf out node_modules

    - name: Verify npm cache
      run: npm cache verify

    - name: Install dependencies with ci
      run: npm ci

    - name: Build VSIX package
      run: vsce package

    - name: Find VSIX file
      id: find-vsix
      run: |
        VSIX_FILE=$(find . -name "*.vsix" -maxdepth 1 | head -1)
        if [ -z "$VSIX_FILE" ]; then
          echo "Error: No VSIX file found"
          exit 1
        fi
        echo "vsix-file=$VSIX_FILE" >> $GITHUB_OUTPUT
        echo "Found VSIX file: $VSIX_FILE"

    - name: Upload VSIX to release (automatic)
      if: github.event_name == 'release'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ github.event.release.tag_name }} ${{ steps.find-vsix.outputs.vsix-file }} --clobber

    - name: Upload VSIX to specified release (manual)
      if: github.event_name == 'workflow_dispatch' && inputs.target_release != ''
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ inputs.target_release }} ${{ steps.find-vsix.outputs.vsix-file }} --clobber

    - name: Upload VSIX as workflow artifact
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: vsix-package-${{ inputs.source_type }}-${{ inputs.source_value }}
        path: ${{ steps.find-vsix.outputs.vsix-file }}
        retention-days: 30
